components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        All endpoints require `Authorization: Bearer <MCP_SECRET>`.
        Auth errors always return HTTP 401 with one of:
        - `MISSING_AUTH_HEADER` — Authorization header absent
        - `INVALID_TOKEN` — token wrong or empty after "Bearer "
        - `INVALID_AUTH_SCHEME` — scheme is not Bearer (e.g. Basic, Digest)

  schemas:

    # ── JSON-RPC envelope ──────────────────────────────────────────────────────────

    McpWriteRequest:
      type: object
      required: [jsonrpc, id, method]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
          description: Must be exactly "2.0".
        id:
          oneOf:
            - type: integer
            - type: string
          description: Client-chosen request identifier echoed in the response.
          example: 1
        method:
          type: string
          enum:
            # Projects
            - create_project
            - update_project
            - delete_project
            # Tokens
            - list_tokens
            - get_token
            - create_token
            - update_token
            - set_token
            - delete_token
            - delete_token_override
            # Components
            - create_component
            - update_component
            - delete_component
            # Patterns
            - create_pattern
            - update_pattern
            - delete_pattern
            - create_variant
            - update_variant
            - delete_variant
            - create_composition_rule
            - delete_composition_rule
            - create_layout_guideline
            - update_layout_guideline
            - delete_layout_guideline
          description: P3 write tool name.
        params:
          type: object
          description: |
            Tool arguments — schema varies by method; see per-method schemas below.
          additionalProperties: true
          default: {}

    McpWriteResult:
      type: object
      required: [jsonrpc, id, result]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          description: |
            Tool-specific result payload. Shape varies by method:
            - create_project / update_project → Project
            - delete_project / delete_token / delete_token_override / delete_component /
              delete_pattern / delete_variant / delete_composition_rule /
              delete_layout_guideline → SuccessAck
            - list_tokens → { tokens: ResolvedToken[] }
            - get_token / create_token / update_token / set_token → Token
            - create_component / update_component → ComponentSpec
            - create_pattern / update_pattern → Pattern
            - create_variant / update_variant → PatternVariant
            - create_composition_rule → CompositionRule
            - create_layout_guideline / update_layout_guideline → LayoutGuideline
          additionalProperties: true

    McpErrorData:
      type: object
      required: [code, message]
      description: |
        Domain error detail carried in the JSON-RPC `error.data` field.
        Use `code` for programmatic logic; never parse `message`.

        All P1/P2 codes remain valid. New P3 codes:

        Registry:     PROJECT_NOT_FOUND, DUPLICATE_PROJECT_ID, CONFLICT,
                      BASE_HAS_CHILDREN, PROJECT_HAS_TOKENS

        Token:        TOKEN_NOT_FOUND, DUPLICATE_TOKEN, CONFLICT, VERSION_MISMATCH,
                      INVALID_CATEGORY, TOKEN_REFERENCED_BY_SEMANTIC

        Component:    COMPONENT_NOT_FOUND, DUPLICATE_COMPONENT_ID, CONFLICT,
                      VERSION_MISMATCH

        Pattern:      PATTERN_NOT_FOUND, DUPLICATE_PATTERN_ID, INVALID_PATTERN_ID,
                      PATTERN_IN_USE, INVALID_PATTERN_CATEGORY

        Composition:  DUPLICATE_COMPOSITION_RULE, COMPOSITION_RULE_NOT_FOUND,
                      INVALID_RELATION

        Guideline:    GUIDELINE_NOT_FOUND, GUIDELINE_IN_USE, INVALID_TYPE
      properties:
        code:
          type: string
          description: Machine-readable domain error code. Stable across versions.
          example: VERSION_MISMATCH
        message:
          type: string
          description: Human-readable error message. Do not parse this field.
          example: "Token 'color.primary.500' version mismatch: expected 2, got 1."

    McpWriteError:
      type: object
      required: [jsonrpc, id, error]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
              description: |
                JSON-RPC 2.0 standard error code:
                  -32700  Parse error
                  -32600  Invalid Request
                  -32601  Method not found
                  -32602  Invalid params (also used for domain validation errors)
                  -32603  Internal error (also used for domain conflict/OCC errors)
              example: -32602
            message:
              type: string
              description: Short JSON-RPC error summary.
              example: "Invalid params"
            data:
              $ref: "#/components/schemas/McpErrorData"
              description: |
                Optional domain error detail. Present for all domain errors
                (PROJECT_NOT_FOUND, VERSION_MISMATCH, etc.). Absent for pure
                protocol errors (parse error, invalid JSON-RPC structure).

    McpWriteResponse:
      description: |
        Per JSON-RPC 2.0, a response contains either `result` or `error`, never both.
      oneOf:
        - $ref: "#/components/schemas/McpWriteResult"
        - $ref: "#/components/schemas/McpWriteError"

    # ── Shared domain schemas ──────────────────────────────────────────────────────

    SuccessAck:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
          description: Always true. Returned by all delete methods on success.
      example:
        success: true

    # ── Project params ─────────────────────────────────────────────────────────────

    CreateProjectParams:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          minLength: 1
          description: Desired project ID (must be unique).
          example: proj-acme
        name:
          type: string
          minLength: 1
          description: Human-readable project name.
          example: "Acme Web App"
        parentId:
          type: string
          description: |
            ID of the parent project to inherit from.
            Omit to create a top-level (base) project.
          example: base

    UpdateProjectParams:
      type: object
      required: [projectId, name]
      properties:
        projectId:
          type: string
          minLength: 1
          description: ID of the project to update.
          example: proj-acme
        name:
          type: string
          minLength: 1
          description: New display name for the project.
          example: "Acme Web App (Redesign)"

    DeleteProjectParams:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
          minLength: 1
          description: ID of the project to delete.
          example: proj-acme

    # ── Token params ───────────────────────────────────────────────────────────────

    ListTokensParams:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
          minLength: 1
          description: Project to list resolved tokens for.
          example: proj-acme
        category:
          $ref: "#/components/schemas/TokenCategory"
          description: Optional filter — returns only tokens of this category.

    GetTokenParams:
      type: object
      required: [projectId, key]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        key:
          type: string
          minLength: 1
          description: Token key in dot-notation.
          example: color.primary.500

    CreateTokenParams:
      type: object
      required: [projectId, key, category, value]
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        key:
          type: string
          minLength: 1
          description: Token key in dot-notation (e.g. `color.primary.500`).
          example: color.primary.500
        category:
          $ref: "#/components/schemas/TokenCategory"
        value:
          type: string
          minLength: 1
          description: Raw token value (hex color, px value, font-family, etc.).
          example: "#0066CC"
        isSemantic:
          type: boolean
          default: false
          description: |
            Set to true when this token references another token via `semanticRef`.
        semanticRef:
          type: string
          description: Key of the primitive token this semantic token resolves to.
          example: color.primary.500

    UpdateTokenParams:
      type: object
      required: [projectId, key, version]
      description: |
        Requires the current `version` obtained from a prior `get_token` call.
        A stale version returns VERSION_MISMATCH (-32603 + data.code).
        At least one of `value` or `semanticRef` must be supplied.
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        key:
          type: string
          minLength: 1
          example: color.primary.500
        version:
          type: integer
          minimum: 0
          description: Expected current version (OCC guard).
          example: 2
        value:
          type: string
          minLength: 1
          description: New token value.
          example: "#0052A3"
        semanticRef:
          type: string
          description: Updated semantic reference key.

    SetTokenParams:
      type: object
      required: [projectId, key, value, version]
      description: |
        Creates or replaces a project-level token override.
        Requires the current `version` of the token (obtained from `get_token`).
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        key:
          type: string
          minLength: 1
          example: color.primary.500
        value:
          type: string
          minLength: 1
          description: Override value for this project.
          example: "#003D8F"
        version:
          type: integer
          minimum: 0
          description: Expected current version of the token (OCC guard).
          example: 2

    DeleteTokenParams:
      type: object
      required: [projectId, key, version]
      description: |
        Permanently removes a token. Requires the current `version` (OCC guard).
        Fails with TOKEN_REFERENCED_BY_SEMANTIC if the token is still referenced.
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        key:
          type: string
          minLength: 1
          example: color.deprecated.300
        version:
          type: integer
          minimum: 0
          description: Expected current version (OCC guard).
          example: 1

    DeleteTokenOverrideParams:
      type: object
      required: [projectId, key]
      description: Reverts a project-level token override, restoring the base value.
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        key:
          type: string
          minLength: 1
          example: color.primary.500

    # ── Component params ───────────────────────────────────────────────────────────

    CreateComponentParams:
      type: object
      required: [projectId, id, name]
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        id:
          type: string
          minLength: 1
          description: Component identifier (e.g. `btn-primary`). Must be unique within the project.
          example: btn-primary
        name:
          type: string
          minLength: 1
          description: Human-readable component name.
          example: "Primary Button"
        description:
          type: string
          example: "The main call-to-action button."
        props:
          type: array
          items:
            $ref: "#/components/schemas/ComponentProp"
          description: Component prop definitions.
        variants:
          type: array
          items:
            type: string
          example: [default, destructive, outline]
        states:
          type: array
          items:
            type: string
          example: [default, hover, focus-visible, disabled]
        usageRules:
          type: array
          items:
            type: string
        accessibilityNotes:
          type: array
          items:
            type: string

    UpdateComponentParams:
      type: object
      required: [projectId, componentId, version]
      description: |
        Requires the current `version` obtained from a prior `get_component_spec` call.
        A stale version returns VERSION_MISMATCH. At least one optional field must be supplied.
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        componentId:
          type: string
          minLength: 1
          example: btn-primary
        version:
          type: integer
          minimum: 0
          description: Expected current version (OCC guard).
          example: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
        props:
          type: array
          items:
            $ref: "#/components/schemas/ComponentProp"
          description: Replaces the entire props array.
        variants:
          type: array
          items:
            type: string
          description: Replaces the entire variants array.
        states:
          type: array
          items:
            type: string
          description: Replaces the entire states array.
        usageRules:
          type: array
          items:
            type: string
          description: Replaces the entire usageRules array.
        accessibilityNotes:
          type: array
          items:
            type: string
          description: Replaces the entire accessibilityNotes array.

    DeleteComponentParams:
      type: object
      required: [projectId, componentId]
      properties:
        projectId:
          type: string
          minLength: 1
          example: base
        componentId:
          type: string
          minLength: 1
          example: btn-legacy

    # ── Pattern params ─────────────────────────────────────────────────────────────

    CreatePatternParams:
      type: object
      required: [projectId, id, name, category]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        id:
          type: string
          description: |
            Pattern ID. Must be kebab-case: lowercase alphanumeric segments separated by
            hyphens (e.g. `card-hero`, `btn-group`). Fails with INVALID_PATTERN_ID if
            the format is violated.
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          example: card-hero
        name:
          type: string
          minLength: 1
          example: "Hero Card"
        category:
          $ref: "#/components/schemas/PatternCategory"
        description:
          type: string
        tags:
          type: array
          items:
            type: string
          example: [responsive, accessibility]
        guidanceUrl:
          type: string
          format: uri
          example: "https://design-docs.acme.com/patterns/hero-card"

    UpdatePatternParams:
      type: object
      required: [projectId, patternId]
      description: At least one of the optional fields must be supplied.
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternId:
          type: string
          minLength: 1
          example: card-hero
        name:
          type: string
          minLength: 1
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        guidanceUrl:
          type: string
          format: uri

    DeletePatternParams:
      type: object
      required: [projectId, patternId]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternId:
          type: string
          minLength: 1
          example: card-deprecated

    CreateVariantParams:
      type: object
      required: [projectId, patternId, name, appliesAt]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternId:
          type: string
          minLength: 1
          example: card-hero
        name:
          type: string
          minLength: 1
          description: Human-readable variant name (e.g. `mobile`, `tablet`, `desktop`).
          example: mobile
        appliesAt:
          $ref: "#/components/schemas/BreakpointName"
        description:
          type: string
          example: "Stack vertically on small screens."

    UpdateVariantParams:
      type: object
      required: [projectId, patternId, variantId]
      description: At least one of the optional fields must be supplied.
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternId:
          type: string
          minLength: 1
          example: card-hero
        variantId:
          type: string
          minLength: 1
          example: variant-mobile
        name:
          type: string
          minLength: 1
        appliesAt:
          $ref: "#/components/schemas/BreakpointName"
        description:
          type: string

    DeleteVariantParams:
      type: object
      required: [projectId, patternId, variantId]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternId:
          type: string
          minLength: 1
          example: card-hero
        variantId:
          type: string
          minLength: 1
          example: variant-wide

    CreateCompositionRuleParams:
      type: object
      required: [projectId, patternAId, patternBId, relation]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        patternAId:
          type: string
          minLength: 1
          description: First pattern ID in the composition pair.
          example: card-hero
        patternBId:
          type: string
          minLength: 1
          description: Second pattern ID in the composition pair.
          example: layout-grid
        relation:
          $ref: "#/components/schemas/CompositionRelation"
        guidance:
          type: string
          description: Optional human-readable guidance for the constraint.
          example: "Hero cards can be placed inside grid layouts; ensure 16px spacing."

    DeleteCompositionRuleParams:
      type: object
      required: [projectId, ruleId]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        ruleId:
          type: string
          minLength: 1
          description: Composition rule ID to delete.
          example: rule-card-inside-grid

    CreateLayoutGuidelineParams:
      type: object
      required: [projectId, type, name, data]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        type:
          $ref: "#/components/schemas/GuidelineType"
        name:
          type: string
          minLength: 1
          example: "Spacing Scale"
        description:
          type: string
          example: "Standard spacing values in pixels."
        data:
          type: object
          additionalProperties: true
          description: |
            Guideline-specific data structure. Shape varies by type:
            - breakpoints: `{ "mobile": { "min": 0, "max": 479 }, ... }`
            - spacing:     `{ "xs": 4, "sm": 8, "md": 16, ... }`
            - grid:        `{ "columns": 12, "gap": 16, ... }`
            - alignment:   `{ "horizontal": ["start","center","end"], ... }`
            - typography:  `{ "size": {...}, "weight": {...}, ... }`
            - animation:   `{ "duration": {...}, "easing": {...}, ... }`
          example:
            xs: 4
            sm: 8
            md: 16
            lg: 24

    UpdateLayoutGuidelineParams:
      type: object
      required: [projectId, guidelineId]
      description: At least one of the optional fields must be supplied.
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        guidelineId:
          type: string
          minLength: 1
          example: guideline-spacing
        name:
          type: string
          minLength: 1
        description:
          type: string
        data:
          type: object
          additionalProperties: true
          description: Replaces the entire data object.

    DeleteLayoutGuidelineParams:
      type: object
      required: [projectId, guidelineId]
      properties:
        projectId:
          type: string
          minLength: 1
          example: proj-acme
        guidelineId:
          type: string
          minLength: 1
          example: guideline-deprecated-breakpoints

    # ── Reused domain types (duplicated from P1/P2 for self-contained spec) ────────

    TokenCategory:
      type: string
      enum: [color, spacing, typography, radius, shadow, breakpoint]
      description: One of the six supported token categories.
      example: color

    BreakpointName:
      type: string
      enum: [mobile, tablet, desktop, wide]
      description: Responsive breakpoint identifier.
      example: mobile

    PatternCategory:
      type: string
      enum: [layout, component, interaction, accessibility, animation, spacing, color, typography]
      description: Pattern classification. Matches P2 PatternCategory.
      example: layout

    CompositionRelation:
      type: string
      enum: [NESTING_ALLOWED, NESTING_FORBIDDEN, OVERRIDE_CAUTION, SIBLING_ONLY, EXCLUSIVE]
      description: |
        Relation type between two patterns:
        - `NESTING_ALLOWED`   — patternA can be safely nested inside patternB
        - `NESTING_FORBIDDEN` — patternA must not nest inside patternB
        - `OVERRIDE_CAUTION`  — patterns can coexist but with caveats (see guidance)
        - `SIBLING_ONLY`      — patterns can be siblings but not nested
        - `EXCLUSIVE`         — patterns cannot appear together in the same view/component
      example: NESTING_ALLOWED

    GuidelineType:
      type: string
      enum: [breakpoints, spacing, grid, alignment, typography, animation]
      description: |
        Type of layout guideline:
        - `breakpoints` — responsive breakpoint definitions
        - `spacing`     — spacing scale (margin/padding values)
        - `grid`        — grid system parameters
        - `alignment`   — alignment and justification rules
        - `typography`  — font, line-height, letter-spacing rules
        - `animation`   — animation/transition timing and easing
      example: spacing

    ComponentProp:
      type: object
      required: [name, type, required]
      properties:
        name:
          type: string
          example: label
        type:
          type: string
          example: string
        required:
          type: boolean
        default:
          type: string
          description: Default value as a string literal.
        description:
          type: string
          example: "Visible button label text."

    AuthErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [MISSING_AUTH_HEADER, INVALID_TOKEN, INVALID_AUTH_SCHEME]
            message:
              type: string
      example:
        error:
          code: MISSING_AUTH_HEADER
          message: "Authorization header is required."

  responses:
    Unauthorized:
      description: |
        Authentication failed. Possible codes:
        - `MISSING_AUTH_HEADER` — Authorization header absent
        - `INVALID_TOKEN` — wrong or empty token
        - `INVALID_AUTH_SCHEME` — scheme is not Bearer
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: 'Bearer realm="mpds-mcp"'
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthErrorEnvelope"
          examples:
            missingHeader:
              value:
                error:
                  code: MISSING_AUTH_HEADER
                  message: "Authorization header is required."
            invalidToken:
              value:
                error:
                  code: INVALID_TOKEN
                  message: "The provided bearer token is invalid."

tags:
  - name: MCP Write Tools
    description: |
      P3 write tools — 23 JSON-RPC methods that let AI agents create and mutate projects,
      tokens, components, patterns, variants, composition rules, and layout guidelines
      through the existing POST /mcp endpoint.
