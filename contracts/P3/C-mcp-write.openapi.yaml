# FROZEN — do not edit without re-freezing (run lint + breaking-change detection)
# Project:  MPDS-MCP (Multi Project Design System MCP Server)
# Module:   C-mcp-write — MCP write tools for AI agent design-system authoring (Phase 3)
# Frozen:   2026-06-22
# Review gates required before any change: code-quality, security (auth surface / public endpoints)

openapi: 3.1.0

info:
  title: MPDS-MCP Write Tools
  version: 3.0.0
  description: |
    MCP JSON-RPC 2.0 write tools that let AI agents build an entire design system through
    natural language. All 23 methods are dispatched through the existing POST /mcp endpoint
    introduced in P1.

    **Paradigm note.** JSON-RPC 2.0 is a single-path protocol; every call is POST /mcp.
    OpenAPI cannot cleanly express per-method request/response shapes via path-level
    discriminators, so each method is documented as a named example on the shared
    `McpWriteRequest` body. Implementers should treat the `method` field as the discriminator
    and validate `params` against the per-method schema defined in `components/schemas`.

    **Auth.** Every call requires `Authorization: Bearer <MCP_SECRET>`.
    Auth failures return HTTP 401 (not JSON-RPC 200+error).

    **Error envelope** (application-level, HTTP 200 with `error` field):
    ```
    { "jsonrpc": "2.0", "id": <id>, "error": { "code": <int>, "message": "<string>" } }
    ```
    Standard JSON-RPC codes used: -32602 (invalid params), -32603 (internal error).
    Domain error codes are carried in `error.data.code` as stable string tokens (e.g.
    `PROJECT_NOT_FOUND`, `VERSION_MISMATCH`). See `McpErrorData` schema.

    **Optimistic concurrency (OCC).** `update_token` and `update_component` require callers
    to supply the current `version` integer obtained from a prior `get_token` /
    `get_component_spec` call. A stale version returns `VERSION_MISMATCH`. Likewise
    `set_token` and `delete_token` require the current `version`.

    **Frozen date:** 2026-06-22.

servers:
  - url: http://localhost:3100
    description: Local development (default MCP_PORT=3100)

security:
  - bearerAuth: []

paths:

  /mcp:
    post:
      operationId: mcpWriteToolCall
      summary: MCP JSON-RPC 2.0 write tool dispatch
      description: |
        Dispatches one of the 23 P3 write tools. The `method` field in the request body
        selects the tool; `params` carries the tool arguments.

        **New methods (P3):**

        Projects:
        - `create_project` — create a new project (optionally inheriting a parent)
        - `update_project` — rename a project
        - `delete_project` — remove a project

        Tokens:
        - `list_tokens` — list resolved tokens for a project (with optional category filter)
        - `get_token` — fetch a single token (use result.version for OCC)
        - `create_token` — add a primitive or semantic token
        - `update_token` — update value/semanticRef (requires current version)
        - `set_token` — create/replace project-level token override (requires version)
        - `delete_token` — remove a token entirely (requires version)
        - `delete_token_override` — revert a project-level override to base value

        Components:
        - `create_component` — register a component spec
        - `update_component` — update component metadata (requires current version)
        - `delete_component` — remove a component spec

        Patterns:
        - `create_pattern` — add a pattern to the catalog
        - `update_pattern` — update pattern metadata
        - `delete_pattern` — remove a pattern
        - `create_variant` — add a responsive variant to a pattern
        - `update_variant` — update variant metadata
        - `delete_variant` — remove a variant
        - `create_composition_rule` — document a composition constraint between two patterns
        - `delete_composition_rule` — remove a composition rule
        - `create_layout_guideline` — add a layout guideline (breakpoints, spacing, etc.)
        - `update_layout_guideline` — update a layout guideline
        - `delete_layout_guideline` — remove a layout guideline

        Per JSON-RPC 2.0, tool-level errors return HTTP 200 with an `error` field;
        only auth failures return a non-200 HTTP status.
      tags: [MCP Write Tools]
      x-phase: "P3"
      parameters:
        - name: X-Agent-ID
          in: header
          required: false
          schema:
            type: string
          description: |
            Optional identifier of the AI agent submitting the call. Used for audit logging
            and rate-limit attribution. No write method requires this header but all accept it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpWriteRequest"
            examples:

              # ── Projects ─────────────────────────────────────────────────────────
              create_project:
                summary: create_project — create a child project
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: create_project
                  params:
                    id: proj-acme
                    name: "Acme Web App"
                    parentId: base

              update_project:
                summary: update_project — rename a project
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: update_project
                  params:
                    projectId: proj-acme
                    name: "Acme Web App (Redesign)"

              delete_project:
                summary: delete_project — remove a project
                value:
                  jsonrpc: "2.0"
                  id: 3
                  method: delete_project
                  params:
                    projectId: proj-acme

              # ── Tokens ───────────────────────────────────────────────────────────
              list_tokens:
                summary: list_tokens — list resolved tokens filtered by category
                value:
                  jsonrpc: "2.0"
                  id: 4
                  method: list_tokens
                  params:
                    projectId: proj-acme
                    category: color

              get_token:
                summary: get_token — fetch a single token (use version for OCC)
                value:
                  jsonrpc: "2.0"
                  id: 5
                  method: get_token
                  params:
                    projectId: proj-acme
                    key: color.primary.500

              create_token:
                summary: create_token — add a primitive color token
                value:
                  jsonrpc: "2.0"
                  id: 6
                  method: create_token
                  params:
                    projectId: base
                    key: color.primary.500
                    category: color
                    value: "#0066CC"
                    isSemantic: false

              update_token:
                summary: update_token — change token value (OCC, requires version)
                value:
                  jsonrpc: "2.0"
                  id: 7
                  method: update_token
                  params:
                    projectId: base
                    key: color.primary.500
                    version: 2
                    value: "#0052A3"

              set_token:
                summary: set_token — create/replace project-level token override
                value:
                  jsonrpc: "2.0"
                  id: 8
                  method: set_token
                  params:
                    projectId: proj-acme
                    key: color.primary.500
                    value: "#003D8F"
                    version: 2

              delete_token:
                summary: delete_token — remove a token entirely
                value:
                  jsonrpc: "2.0"
                  id: 9
                  method: delete_token
                  params:
                    projectId: base
                    key: color.deprecated.300
                    version: 1

              delete_token_override:
                summary: delete_token_override — revert override to base value
                value:
                  jsonrpc: "2.0"
                  id: 10
                  method: delete_token_override
                  params:
                    projectId: proj-acme
                    key: color.primary.500

              # ── Components ───────────────────────────────────────────────────────
              create_component:
                summary: create_component — register a component spec
                value:
                  jsonrpc: "2.0"
                  id: 11
                  method: create_component
                  params:
                    projectId: base
                    id: btn-primary
                    name: "Primary Button"
                    description: "The main call-to-action button."
                    props:
                      - name: label
                        type: string
                        required: true
                        description: "Visible button label text."
                      - name: disabled
                        type: boolean
                        required: false
                        default: "false"
                    variants: [default, destructive, outline]
                    states: [default, hover, focus-visible, disabled]
                    usageRules:
                      - "Use for the primary action on a page."
                      - "Limit to one per view."
                    accessibilityNotes:
                      - "Must have a visible focus indicator (WCAG 2.4.7)."

              update_component:
                summary: update_component — update metadata (OCC, requires version)
                value:
                  jsonrpc: "2.0"
                  id: 12
                  method: update_component
                  params:
                    projectId: base
                    componentId: btn-primary
                    version: 1
                    description: "The main CTA button — updated for dark-mode compliance."
                    accessibilityNotes:
                      - "Must have a visible focus indicator (WCAG 2.4.7)."
                      - "Label must be descriptive (WCAG 4.1.2)."

              delete_component:
                summary: delete_component — remove a component spec
                value:
                  jsonrpc: "2.0"
                  id: 13
                  method: delete_component
                  params:
                    projectId: base
                    componentId: btn-legacy

              # ── Patterns ─────────────────────────────────────────────────────────
              create_pattern:
                summary: create_pattern — add a pattern to the catalog
                value:
                  jsonrpc: "2.0"
                  id: 14
                  method: create_pattern
                  params:
                    projectId: proj-acme
                    id: card-hero
                    name: "Hero Card"
                    category: layout
                    description: "Full-width card with image, title, and CTA button."
                    tags: [responsive, accessibility]
                    guidanceUrl: "https://design-docs.acme.com/patterns/hero-card"

              update_pattern:
                summary: update_pattern — update pattern metadata
                value:
                  jsonrpc: "2.0"
                  id: 15
                  method: update_pattern
                  params:
                    projectId: proj-acme
                    patternId: card-hero
                    name: "Hero Card (v2)"
                    description: "Full-width hero card with badge support."
                    guidanceUrl: "https://design-docs.acme.com/patterns/hero-card/v2"

              delete_pattern:
                summary: delete_pattern — remove a pattern
                value:
                  jsonrpc: "2.0"
                  id: 16
                  method: delete_pattern
                  params:
                    projectId: proj-acme
                    patternId: card-deprecated

              create_variant:
                summary: create_variant — add a responsive variant
                value:
                  jsonrpc: "2.0"
                  id: 17
                  method: create_variant
                  params:
                    projectId: proj-acme
                    patternId: card-hero
                    name: mobile
                    appliesAt: mobile
                    description: "Stack vertically on small screens."

              update_variant:
                summary: update_variant — update variant metadata
                value:
                  jsonrpc: "2.0"
                  id: 18
                  method: update_variant
                  params:
                    projectId: proj-acme
                    patternId: card-hero
                    variantId: variant-mobile
                    description: "Stack vertically; hide badge on screens below 480px."

              delete_variant:
                summary: delete_variant — remove a variant
                value:
                  jsonrpc: "2.0"
                  id: 19
                  method: delete_variant
                  params:
                    projectId: proj-acme
                    patternId: card-hero
                    variantId: variant-wide

              create_composition_rule:
                summary: create_composition_rule — document a composition constraint
                value:
                  jsonrpc: "2.0"
                  id: 20
                  method: create_composition_rule
                  params:
                    projectId: proj-acme
                    patternAId: card-hero
                    patternBId: layout-grid
                    relation: NESTING_ALLOWED
                    guidance: "Hero cards can be placed inside grid layouts; ensure 16px spacing."

              delete_composition_rule:
                summary: delete_composition_rule — remove a composition rule
                value:
                  jsonrpc: "2.0"
                  id: 21
                  method: delete_composition_rule
                  params:
                    projectId: proj-acme
                    ruleId: rule-card-inside-grid

              create_layout_guideline:
                summary: create_layout_guideline — add a layout guideline
                value:
                  jsonrpc: "2.0"
                  id: 22
                  method: create_layout_guideline
                  params:
                    projectId: proj-acme
                    type: spacing
                    name: "Spacing Scale"
                    description: "Standard spacing values in pixels."
                    data:
                      xs: 4
                      sm: 8
                      md: 16
                      lg: 24
                      xl: 32
                      xxl: 48

              update_layout_guideline:
                summary: update_layout_guideline — update a layout guideline
                value:
                  jsonrpc: "2.0"
                  id: 23
                  method: update_layout_guideline
                  params:
                    projectId: proj-acme
                    guidelineId: guideline-spacing
                    name: "Spacing Scale (v2)"
                    data:
                      xs: 2
                      sm: 8
                      md: 16
                      lg: 24
                      xl: 32
                      xxl: 48

              delete_layout_guideline:
                summary: delete_layout_guideline — remove a layout guideline
                value:
                  jsonrpc: "2.0"
                  id: 24
                  method: delete_layout_guideline
                  params:
                    projectId: proj-acme
                    guidelineId: guideline-deprecated-breakpoints

      responses:
        "200":
          description: |
            JSON-RPC 2.0 response. Contains `result` on success or `error` on failure — never
            both. HTTP 200 is returned for both outcomes; only auth failures produce a non-200.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpWriteResponse"
              examples:

                # ── Success examples ────────────────────────────────────────────────
                create_project_result:
                  summary: create_project success
                  value:
                    jsonrpc: "2.0"
                    id: 1
                    result:
                      id: proj-acme
                      name: "Acme Web App"
                      parentId: base
                      createdAt: "2026-06-22T10:00:00.000Z"

