id: US-010
title: Generate a visual design showcase
description: "As a ui-ux AI agent, I want to call generate_showcase with a projectId so that I get back a self-contained HTML page I can open in a browser to review the design system visually"
requirements:
  - REQ-010
acceptanceCriteria:
  - id: AC-1
    text: "Given a valid projectId, when I call generate_showcase, then the response contains { html, tokenCount, componentCount, patternCount } where counts reflect the project's actual data"
  - id: AC-2
    text: "Given the returned HTML, when I open it in a browser with no network connection, then all styles, fonts, and layout render correctly (no external CDN, font, or image dependencies)"
  - id: AC-3
    text: "Given color and other tokens in the project, when the HTML is rendered, then :root contains a CSS custom property --token-{key-with-dots-as-hyphens} for every token whose value is applied inline"
  - id: AC-4
    text: "Given color tokens in the project, when the color palette section is displayed, then each token appears as a filled color rectangle swatch alongside its key, its hex/rgba value, and a 'semantic' or 'base' badge"
  - id: AC-5
    text: "Given spacing tokens in the project, when the spacing section is displayed, then each token appears as a proportional horizontal bar whose width visually represents the spacing value"
  - id: AC-6
    text: "Given component specs in the project, when the component gallery section is displayed, then each component shows its name, a chip list of variants, a chip list of states, and a props table (name, type, required, default)"
  - id: AC-7
    text: "Given patterns in the project, when the pattern library section is displayed, then each pattern shows its name, a category badge, its description, and a count of its variants"
  - id: AC-8
    text: "Given a section (tokens, components, or patterns) whose count is 0, when the HTML is rendered, then that section is hidden and does not appear in the output"
  - id: AC-9
    text: "Given a projectId that does not exist in the registry, when I call generate_showcase, then the tool returns an error with code PROJECT_NOT_FOUND and no HTML is returned"
coverage: covered
phase: P4
tags:
  - "@US-P4-001"
testHooks: "Tag BDD scenarios with @US-P4-001; cover happy-path (valid project with tokens, components, and patterns), empty-sections scenario (project with no patterns → pattern section hidden), and PROJECT_NOT_FOUND error case via MCP tool call"
